version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: closely_db
    restart: always
    environment:
      POSTGRES_DB: closely_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: closely_redis
    restart: always

  backend:
    build: ./backend
    container_name: closely_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/closely_db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkeyforcloselymvp2026!!!}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
